<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--black); padding: 30px; font-family: var(--font-body); }
  .lbl { font-family: var(--font-label); font-weight: 600; font-size: .66rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin: 0 0 12px; }
  .stack { display: flex; flex-direction: column; gap: 30px; }
  .pricing { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start; }
  @keyframes kms-shimmer { to { background-position: -200% 0; } }
  h3 { font-family: var(--font-display); font-size: 1.5rem; letter-spacing: .04em; text-transform: uppercase; color: var(--off-white); margin: 0 0 8px; }
  .body { font-family: var(--font-body); font-weight: 300; font-size: .95rem; line-height: 1.6; color: var(--muted); margin: 0; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Card, PricingCard, FaqItem } = window.KingMakerSocietyDesignSystem_b08c13;
    function Demo() {
      return (
        <div className="stack">
          <div>
            <p className="lbl">Card</p>
            <Card>
              <h3>24/7 Brotherhood Chat</h3>
              <p className="body">Always active. Share wins, get feedback, stay disciplined.</p>
            </Card>
          </div>
          <div>
            <p className="lbl">Pricing Cards</p>
            <div className="pricing">
              <PricingCard tier="Basic" price="$30" cta="Join Basic"
                features={["24/7 self-improvement chat", "2x Master Classes weekly", "Brotherhood accountability"]} />
              <PricingCard tier="VIO Access" price="$100" featured cta="Join VIO"
                features={["Everything in Basic", "Monthly 1-on-1 Mini-Audit", "Member spotlights"]} />
            </div>
          </div>
          <div>
            <p className="lbl">FAQ Accordion</p>
            <Card padding="0 var(--space-6)">
              <FaqItem defaultOpen question="Can I try it before committing?" answer="Yes — 7-day free trial. No credit card required." />
              <FaqItem question="Can I cancel anytime?" answer="Yes. Month-to-month. Cancel through your Stripe billing portal anytime." />
            </Card>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
