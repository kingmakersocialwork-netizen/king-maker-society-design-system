<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing Scale" subtitle="8pt base. Used for padding, gaps, section rhythm." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--black); padding: 28px 32px; font-family: var(--font-label); }
  .scale { display: flex; align-items: flex-end; gap: 16px; }
  .unit { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { width: 26px; background: linear-gradient(var(--gold), var(--gold-deep)); border-radius: 2px; }
  .n { font-weight: 700; font-size: .66rem; letter-spacing: .08em; color: var(--off-white); }
  .px { font-family: var(--font-body); font-weight: 300; font-size: .62rem; color: var(--muted); }
</style>
</head>
<body>
  <div class="scale">
    <div class="unit"><div class="bar" style="height:8px"></div><span class="n">2</span><span class="px">8</span></div>
    <div class="unit"><div class="bar" style="height:16px"></div><span class="n">4</span><span class="px">16</span></div>
    <div class="unit"><div class="bar" style="height:24px"></div><span class="n">5</span><span class="px">24</span></div>
    <div class="unit"><div class="bar" style="height:32px"></div><span class="n">6</span><span class="px">32</span></div>
    <div class="unit"><div class="bar" style="height:48px"></div><span class="n">7</span><span class="px">48</span></div>
    <div class="unit"><div class="bar" style="height:64px"></div><span class="n">8</span><span class="px">64</span></div>
    <div class="unit"><div class="bar" style="height:96px"></div><span class="n">9</span><span class="px">96</span></div>
  </div>
</body>
</html>
