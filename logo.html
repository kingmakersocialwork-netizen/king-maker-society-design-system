<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: radial-gradient(ellipse at 50% 40%, #1a1510 0%, var(--black) 70%); min-height: 100vh; display: flex; align-items: center; justify-content: center; gap: 44px; padding: 24px; }
  img { width: 240px; height: auto; filter: drop-shadow(0 10px 30px rgba(138,95,16,.5)); }
  .meta { font-family: var(--font-label); display: flex; flex-direction: column; gap: 10px; }
  .word { font-family: var(--font-display); font-size: 2rem; letter-spacing: .06em; color: var(--off-white); text-transform: uppercase; line-height: .9; }
  .tag { font-weight: 600; font-size: .72rem; letter-spacing: .22em; text-transform: uppercase; color: var(--gold); }
  .rule { font-family: var(--font-body); font-weight: 300; font-size: .8rem; color: var(--muted); max-width: 220px; line-height: 1.6; }
</style>
</head>
<body>
  <img src="../assets/logo.png" alt="King Maker Society crown logo" loading="lazy">
  <div class="meta">
    <div class="word">King Maker<br>Society</div>
    <div class="tag">Kings Are Made, Not Born</div>
    <div class="rule">Gold crown emblem. Always on black or charcoal — never on a light background.</div>
  </div>
</body>
</html>
