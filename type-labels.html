<!-- @dsCard group="Type" viewport="700x200" name="Barlow Condensed — Labels" subtitle="Eyebrows, nav, buttons, tags. Heavy tracking, uppercase." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--black); padding: 28px 32px; font-family: var(--font-label); }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .item { display: flex; align-items: baseline; gap: 18px; }
  .eyebrow { font-weight: 600; font-size: .8rem; letter-spacing: .22em; text-transform: uppercase; color: var(--gold); }
  .nav { font-weight: 600; font-size: .95rem; letter-spacing: .12em; text-transform: uppercase; color: var(--off-white); }
  .tag { font-weight: 700; font-size: .68rem; letter-spacing: .2em; text-transform: uppercase; color: var(--black); background: var(--gold); padding: 5px 10px; border-radius: 4px; }
  .cap { font-family: var(--font-body); font-weight: 300; font-size: .72rem; color: var(--muted); letter-spacing: .02em; min-width: 130px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="item"><span class="cap">Eyebrow / .22em</span><span class="eyebrow">What You Get</span></div>
    <div class="item"><span class="cap">Nav link / .12em</span><span class="nav">Brotherhood</span></div>
    <div class="item"><span class="cap">Tag / badge</span><span class="tag">Weekday 2PM CST</span></div>
  </div>
</body>
</html>
