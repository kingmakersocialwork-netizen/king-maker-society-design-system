<!-- @dsCard group="Type" viewport="700x230" name="Bebas Neue — Display" subtitle="Hero & section headlines. Uppercase, wide tracking." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--black); padding: 28px 32px; }
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .hero { font-family: var(--font-display); font-size: 4.2rem; line-height: .9; letter-spacing: .04em; color: var(--off-white); text-transform: uppercase; }
  .hero em { color: var(--gold); font-style: normal; }
  .sec { font-family: var(--font-display); font-size: 2.2rem; letter-spacing: .04em; color: var(--off-white); text-transform: uppercase; line-height: 1; }
  .label { font-family: var(--font-label); font-weight: 600; font-size: .68rem; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
</style>
</head>
<body>
  <div class="label">Bebas Neue · tracking 0.04–0.08em</div>
  <div class="stack">
    <div class="hero">Kings Are <em>Made</em></div>
    <div class="sec">Built For Those Who Show Up</div>
  </div>
</body>
</html>
